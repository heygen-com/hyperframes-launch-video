        tl.to(line2Words, { y: -3, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1, stagger: 0.04 }, 5.00);

        gsap.set(line3Words, { opacity: 0 });

        gsap.set(line3Words[0], { x: -80, y: 20, rotate: -6, opacity: 0 });
        tl.to(line3Words[0], { x: 0, y: 0, rotate: 0, opacity: 1, duration: 0.26, ease: "back.out(1.4)" }, 5.43);

        tl.to(line3Words[1], { y: 0, rotate: 0, opacity: 1, duration: 0.26, ease: "back.out(1.4)" }, 5.62);
