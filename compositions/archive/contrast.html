<template id="contrast-template">
  <div
    data-composition-id="contrast"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="6.4"
  >
    <div class="ct-bg"></div>

    <!-- Zoom-through entry wrapper -->
    <div class="ct-zoom-wrap">

    <!-- LEFT: Floating editor window — dense framework code -->
    <div class="ct-editor ct-editor-left">
      <div class="ct-titlebar ct-titlebar-dark">
        <span class="ct-dot" style="background:#ff5f57"></span>
        <span class="ct-dot" style="background:#febc2e"></span>
        <span class="ct-dot" style="background:#28c840"></span>
        <span class="ct-tab">instructions.config.js</span>
        <span class="ct-tab ct-tab-dim">plugin-registry.js</span>
        <span class="ct-tab ct-tab-dim">transitions.js</span>
      </div>
      <div class="ct-editor-body ct-body-dark">
        <div class="ct-line-nums" id="ct-lnums-left"></div>
        <div class="ct-code-scroll">
          <pre class="ct-code-dense">registerPlugin("timeline", {
  version: "3.2.1",
  config: {
    autoplay: false,
    renderer: "canvas",
    framerate: 30,
    maxDuration: 300,
    bufferSize: 4096,
    audioSync: true,
    captureMode: "sequential"
  },
  plugins: [
    "motion-path",
    "physics-2d",
    "scroll-trigger",
    "split-text",
    "morph-svg"
  ],
  instructions: {
    clip: {
      type: "video",
      required: ["src", "start", "end"],
      optional: ["volume", "speed",
        "filter", "blend", "mask",
        "chromaKey", "stabilize"],
      transitions: {
        in: ["fade", "wipe", "slide",
          "dissolve", "zoom", "iris",
          "morph", "glitch"],
        out: ["fade", "wipe", "slide",
          "dissolve", "zoom", "iris"]
      },
      effects: {
        color: ["brightness",
          "contrast", "saturation",
          "hue", "temperature"],
        spatial: ["scale", "rotate",
          "translate", "skew",
          "perspective"],
        temporal: ["speed", "reverse",
          "freeze", "loop"]
      }
    },
    audio: {
      type: "track",
      required: ["src"],
      ducking: {
        threshold: -18,
        ratio: 3,
        attack: 0.1,
        release: 0.5
      },
      normalize: true,
      compressor: {
        knee: 30,
        ratio: 12,
        attack: 0.003
      }
    },
    text: {
      type: "overlay",
      required: ["content", "font"],
      animation: {
        entry: ["typewriter",
          "fade", "slide",
          "bounce", "elastic"],
        emphasis: ["highlight",
          "underline", "glow",
          "shake", "pulse"]
      }
    }
  }
});</pre>
        </div>
      </div>
      <div class="ct-badge ct-badge-left">4,500 lines of instructions</div>
    </div>

    <!-- RIGHT: Floating editor window — clean Hyperframe HTML -->
    <div class="ct-editor ct-editor-right">
      <div class="ct-titlebar ct-titlebar-light">
        <span class="ct-dot" style="background:#ff5f57"></span>
        <span class="ct-dot" style="background:#febc2e"></span>
        <span class="ct-dot" style="background:#28c840"></span>
        <span class="ct-tab ct-tab-warm">composition.html</span>
      </div>
      <div class="ct-editor-body ct-body-light">
        <div class="ct-line-nums ct-line-nums-light" id="ct-lnums-right"></div>
        <pre class="ct-code-clean"><span class="ck">&lt;div</span>
  <span class="ca">data-composition-id</span>=<span class="cv">"intro"</span>
  <span class="ca">data-width</span>=<span class="cv">"1920"</span>
  <span class="ca">data-height</span>=<span class="cv">"1080"</span>
  <span class="ca">data-duration</span>=<span class="cv">"10"</span><span class="ck">&gt;</span>

  <span class="ck">&lt;div</span> <span class="ca">class</span>=<span class="cv">"title"</span><span class="ck">&gt;</span>
    Hello, world.
  <span class="ck">&lt;/div&gt;</span>

  <span class="ck">&lt;script&gt;</span>
    <span class="cj">const</span> tl = gsap.<span class="cf">timeline</span>();
    tl.<span class="cf">to</span>(<span class="cv">".title"</span>, {
      opacity: <span class="cn">1</span>,
      y: <span class="cn">0</span>,
      duration: <span class="cn">0.8</span>
    });
  <span class="ck">&lt;/script&gt;</span>
<span class="ck">&lt;/div&gt;</span></pre>
      </div>
      <div class="ct-badge ct-badge-right">one skill file</div>
    </div>

    <!-- "Just HTML." statement -->
    <div class="ct-just">Just HTML.</div>

    <!-- Warm glow -->
    <div class="ct-glow"></div>

    </div><!-- /.ct-zoom-wrap -->

    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Geist:wght@500;600&family=Fraunces:ital,opsz,wght,SOFT@1,9..144,400,80&display=swap");

      [data-composition-id="contrast"] {
        width: 1920px; height: 1080px;
        position: relative; overflow: hidden;
        background: #f7f5f0;
      }
      [data-composition-id="contrast"] .ct-zoom-wrap {
        position: absolute; inset: 0;
        will-change: transform, filter;
      }
      [data-composition-id="contrast"] .ct-bg {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at 50% 50%, #faf8f4 0%, #eae5da 100%);
      }

      /* Editor windows — floating with shadow + chrome */
      [data-composition-id="contrast"] .ct-editor {
        position: absolute;
        border-radius: 14px;
        overflow: hidden;
        will-change: transform;
      }
      [data-composition-id="contrast"] .ct-editor-left {
        top: 80px; left: 80px;
        width: 820px; height: 860px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.35), 0 8px 24px rgba(0,0,0,0.2);
        transform: rotate(-1.5deg);
        z-index: 2;
      }
      [data-composition-id="contrast"] .ct-editor-right {
        top: 120px; right: 80px;
        width: 820px; height: 720px;
        box-shadow: 0 24px 60px rgba(80,60,20,0.18), 0 6px 18px rgba(80,60,20,0.1);
        transform: rotate(1deg);
        z-index: 3;
      }

      /* Title bars */
      [data-composition-id="contrast"] .ct-titlebar {
        height: 44px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 8px;
      }
      [data-composition-id="contrast"] .ct-titlebar-dark {
        background: #1e1e1e;
        border-bottom: 1px solid #333;
      }
      [data-composition-id="contrast"] .ct-titlebar-light {
        background: #f0ebe3;
        border-bottom: 1px solid #ddd5c8;
      }
      [data-composition-id="contrast"] .ct-dot {
        width: 12px; height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      [data-composition-id="contrast"] .ct-tab {
        margin-left: 12px;
        font-family: "Geist", sans-serif;
        font-weight: 500;
        font-size: 13px;
        color: rgba(255,255,255,0.7);
        padding: 4px 12px;
        background: rgba(255,255,255,0.08);
        border-radius: 6px;
      }
      [data-composition-id="contrast"] .ct-tab-dim {
        background: none;
        color: rgba(255,255,255,0.3);
      }
      [data-composition-id="contrast"] .ct-tab-warm {
        color: #5a4a30;
        background: rgba(200,160,80,0.15);
      }

      /* Editor bodies */
      [data-composition-id="contrast"] .ct-editor-body {
        position: relative;
        height: calc(100% - 44px);
        overflow: hidden;
      }
      [data-composition-id="contrast"] .ct-body-dark {
        background: #1a1a1a;
        display: flex;
      }
      [data-composition-id="contrast"] .ct-body-light {
        background: #fcf8f0;
        display: flex;
      }

      /* Line numbers */
      [data-composition-id="contrast"] .ct-line-nums {
        width: 48px;
        padding: 16px 8px 16px 0;
        text-align: right;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        line-height: 1.55;
        color: rgba(255,255,255,0.18);
        flex-shrink: 0;
        user-select: none;
      }
      [data-composition-id="contrast"] .ct-line-nums-light {
        color: rgba(60,50,30,0.2);
      }

      /* Code blocks */
      [data-composition-id="contrast"] .ct-code-scroll {
        flex: 1;
        overflow: hidden;
        position: relative;
      }
      [data-composition-id="contrast"] .ct-code-dense {
        font-family: "JetBrains Mono", monospace;
        font-weight: 400;
        font-size: 13px;
        line-height: 1.55;
        color: rgba(255,255,255,0.55);
        white-space: pre;
        margin: 0;
        padding: 16px 20px;
        will-change: transform;
      }
      [data-composition-id="contrast"] .ct-code-clean {
        font-family: "JetBrains Mono", monospace;
        font-weight: 400;
        font-size: 15px;
        line-height: 1.85;
        color: #3a3020;
        white-space: pre;
        margin: 0;
        padding: 20px 24px;
        flex: 1;
      }
      /* Syntax highlighting */
      [data-composition-id="contrast"] .ck { color: #c84f1c; }
      [data-composition-id="contrast"] .ca { color: #457b9d; }
      [data-composition-id="contrast"] .cv { color: #2a9d8f; }
      [data-composition-id="contrast"] .cj { color: #7c5cbf; }
      [data-composition-id="contrast"] .cf { color: #c8860a; }
      [data-composition-id="contrast"] .cn { color: #d35a1a; }

      /* Badges */
      [data-composition-id="contrast"] .ct-badge {
        position: absolute;
        font-family: "JetBrains Mono", monospace;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: 0.04em;
        padding: 6px 16px;
        border-radius: 8px;
      }
      [data-composition-id="contrast"] .ct-badge-left {
        bottom: -44px; left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.5);
        background: rgba(30,30,30,0.7);
      }
      [data-composition-id="contrast"] .ct-badge-right {
        bottom: -44px; left: 50%;
        transform: translateX(-50%);
        color: #8a7a50;
        background: rgba(252,248,240,0.85);
        border: 1px solid rgba(200,160,80,0.2);
      }

      /* "Just HTML." */
      [data-composition-id="contrast"] .ct-just {
        position: absolute;
        top: 50%; left: 50%;
        font-family: "Fraunces", serif;
        font-variation-settings: "opsz" 48, "wght" 400, "SOFT" 80;
        font-style: italic;
        font-size: 96px;
        color: #14110a;
        letter-spacing: -0.01em;
        z-index: 5;
      }

      /* Warm glow */
      [data-composition-id="contrast"] .ct-glow {
        position: absolute;
        top: 50%; left: 50%;
        width: 1400px; height: 900px;
        margin-left: -700px; margin-top: -450px;
        background: radial-gradient(ellipse, rgba(255, 220, 160, 0.2) 0%, transparent 65%);
        opacity: 0;
        pointer-events: none;
        z-index: 4;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var root = document.querySelector('[data-composition-id="contrast"]');

        var edLeft = root.querySelector(".ct-editor-left");
        var edRight = root.querySelector(".ct-editor-right");
        var leftCode = root.querySelector(".ct-code-dense");
        var badgeLeft = root.querySelector(".ct-badge-left");
        var badgeRight = root.querySelector(".ct-badge-right");
        var justHtml = root.querySelector(".ct-just");
        var glow = root.querySelector(".ct-glow");

        // Generate line numbers
        var lnLeft = root.querySelector("#ct-lnums-left");
        var lnRight = root.querySelector("#ct-lnums-right");
        for (var i = 1; i <= 80; i++) {
          lnLeft.innerHTML += i + "<br>";
        }
        for (var j = 1; j <= 20; j++) {
          lnRight.innerHTML += j + "<br>";
        }

        var zoomWrap = root.querySelector(".ct-zoom-wrap");

        gsap.set(justHtml, { xPercent: -50, yPercent: -50, opacity: 0, scale: 0.92 });
        gsap.set(badgeLeft, { opacity: 0, y: 8 });
        gsap.set(badgeRight, { opacity: 0, y: 8 });

        // === Zoom-through entry (0 → 0.5s) ===
        // Continues forward from 6L's exit — scale grows into focal plane
        gsap.set(zoomWrap, { scale: 0.75, filter: "blur(20px)", opacity: 0.15 });
        tl.to(zoomWrap, {
          scale: 1, filter: "blur(0px)", opacity: 1,
          duration: 0.5, ease: "expo.out"
        }, 0);

        // Editors start at their resting positions (zoom-wrap handles the entry)
        gsap.set(edLeft, { rotation: -1.5 });
        gsap.set(edRight, { rotation: 1 });

        // Badges fade in after zoom settles
        tl.to(badgeLeft, { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" }, 0.35);
        tl.to(badgeRight, { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" }, 0.40);

        // === Phase 2: Code contrast (0.6 → 3.5s) ===
        // Left code scrolls upward — density overwhelms
        tl.to(leftCode, { y: -500, duration: 2.9, ease: "none" }, 0.6);

        // Left editor subtly grows (looming)
        tl.to(edLeft, { scale: 1.03, rotation: -2, duration: 2.5, ease: "sine.inOut" }, 0.8);

        // Right editor breathes gently (calm)
        tl.to(edRight, { y: -8, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0.8);

        // === Phase 3: "Just HTML." (3.5 → 5.0s) ===
        // Left editor collapses — folds in with perspective
        tl.to(edLeft, {
          scaleX: 0, opacity: 0, x: 200,
          duration: 0.7, ease: "power3.in"
        }, 3.5);
        tl.to(badgeLeft, { opacity: 0, duration: 0.3, ease: "power2.in" }, 3.5);

        // Right editor moves to true center of 1920px canvas
        // Editor is right:80px (=left:1020px), width:820px.
        // Center target: left:(1920-820)/2 = 550px. Shift: 550-1020 = -470px.
        // Also center vertically: top:120px, height:720px.
        // Center target: top:(1080-720)/2 = 180px. Shift: 180-120 = 60px.
        tl.to(edRight, {
          x: -470, y: 60, rotation: 0,
          duration: 0.8, ease: "power2.out"
        }, 3.8);
        tl.to(badgeRight, { opacity: 0, duration: 0.3, ease: "power2.in" }, 3.8);

        // "Just HTML." appears
        tl.to(justHtml, {
          opacity: 1, scale: 1,
          duration: 0.5, ease: "power2.out"
        }, 4.2);

        // Warm glow
        tl.to(glow, { opacity: 1, duration: 0.6, ease: "sine.out" }, 4.0);

        // Right editor fades gently as statement takes focus
        tl.to(edRight, { opacity: 0.4, scale: 1.2, duration: 0.8, ease: "sine.inOut" }, 4.5);

        // === Phase 4: Hold (5.0 → 6.4s) ===
        tl.to(justHtml, {
          scale: 1.02, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1
        }, 5.0);
        tl.to(glow, { opacity: 0.5, duration: 1.2, ease: "sine.inOut" }, 5.2);

        // --- Cut-the-curve upward exit (6.07 → 6.4s) ---
        tl.to(zoomWrap, {
          y: -150, filter: "blur(30px)",
          duration: 0.33, ease: "power2.in"
        }, 6.07);

        window.__timelines["contrast"] = tl;
      })();
    </script>
  </div>
</template>
