      [data-composition-id="canvas-open"] .c14-fill { stroke-dasharray:264; stroke-dashoffset:264; transform:rotate(-90deg); transform-origin:50% 50%; }
      [data-composition-id="canvas-open"] .c14-pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
        font-family:"JetBrains Mono",monospace; font-weight:500; font-size:32px; color:#14110a; }

      /* C15 — Typography specimen */
      [data-composition-id="canvas-open"] .c15 { background:#f5ead1; }
      [data-composition-id="canvas-open"] .c15-spec { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
      [data-composition-id="canvas-open"] .c15-big { font-family:"Instrument Serif",serif; font-size:108px; color:#14110a; line-height:1; }
      [data-composition-id="canvas-open"] .c15-label { font-family:"JetBrains Mono",monospace; font-size:12px; color:#8a6a2a; letter-spacing:0.06em; }

      /* C16 — Gradient blob */
      [data-composition-id="canvas-open"] .c16 { background:#1a1410; border-radius:50%; }
      [data-composition-id="canvas-open"] .c16-blob { position:absolute; inset:0; border-radius:50%;
        background: radial-gradient(circle at 40% 35%,#e8935d 0%,transparent 55%),
          radial-gradient(circle at 70% 70%,#7fc3c8 0%,transparent 50%),
          #1a1410;
        filter:blur(14px) saturate(1.3); }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var root = document.querySelector('[data-composition-id="canvas-open"]');
        var zoomWrap = root.querySelector(".zoom-wrap");
        var plane = root.querySelector(".canvas-plane");
        var c1 = root.querySelector(".c1");

        // === PAN (on .canvas-plane): runs full 3.21s, no interruption ===
        // x: -600→400 (1000px), y: -360→240 (600px), rotation: 3°→-1°
        // power2.out = front-loaded speed, decelerating throughout.
        gsap.set(plane, { x: -600, y: -360, rotation: 3.0 });
        tl.to(plane,
          { x: 400, y: 240, rotation: -1.0, duration: 3.21, ease: "power1.out" },
          0);

        // === ZOOM (on .zoom-wrap): 1.75→3.21s, overlaps last 1.46s of pan ===
        // Scales around (740, 480) = C1's viewport position at pan end.
        // Translate (220, 60) shifts that origin to viewport center (960, 540).
        // Pan and zoom run on SEPARATE elements — no property conflict.
        // power3.in accelerates hard at the end — exit velocity ≈ 2.47 scale/s,
        // matching Beat 2's power2.out entry velocity ≈ 2.53 scale/s.
        tl.to(zoomWrap,
          { scale: 2.2, x: 220, y: 60, duration: 0.834, ease: "power3.in" },
          2.376);

        // C1 lifts off — grows slightly + shadow deepens
        tl.to(c1,
          { scale: 1.08, boxShadow: "0 32px 64px rgba(80,55,15,0.35), 0 8px 20px rgba(80,55,15,0.18)",
            duration: 0.457, ease: "power2.in" },
          2.52);

        // Other cards dim gradually — focus narrows to C1
        var otherCards = root.querySelectorAll(".card:not(.c1)");
        tl.to(otherCards, { opacity: 0.35, duration: 0.4, ease: "power2.in" }, 2.52);

        // Blur ramp on zoom-wrap — starts early so blur is well established by the cut
        tl.to(zoomWrap,
          { filter: "blur(16px)", opacity: 0.75, duration: 0.577, ease: "power2.in" },
          2.63);

        // === SHOWCASE VIDEOS: play from start, muted, for scene duration ===
        var showcaseVideos = root.querySelectorAll(".cs-video");
        showcaseVideos.forEach(function (v) {
          v.currentTime = 0;
          v.play().catch(function () {});
        });

        // === CARD ANIMATIONS ===

        // C1 — letters breathe
        root.querySelectorAll(".c1-l").forEach(function (el, i) {
          tl.to(el, { y: -8, rotation: i % 2 === 0 ? 4 : -4,
            duration: 0.5, ease: "sine.inOut", repeat: 3, yoyo: true }, i * 0.07);
        });

        // C2 — gradient shift
        tl.fromTo(root.querySelector(".c2-grad"),
          { backgroundPosition: "0% 50%", filter: "hue-rotate(0deg)" },
          { backgroundPosition: "100% 50%", filter: "hue-rotate(40deg)", duration: 2.71, ease: "sine.inOut" }, 0);

        // C3 — bars grow + settle
        var bH = [60, 120, 90, 140, 108];
        root.querySelectorAll(".c3-bar").forEach(function (bar, i) {
          tl.fromTo(bar, { height: 0 }, { height: bH[i], duration: 0.6, ease: "power3.out" }, 0.04 + i * 0.05);
          tl.to(bar, { height: bH[i] * 0.93, duration: 0.8, ease: "sine.inOut", repeat: 1, yoyo: true }, 0.8 + i * 0.05);
        });

        // C4 — particles pulse
        var c4g = root.querySelector("#c4-grid");
        for (var i = 0; i < 35; i++) { var d = document.createElement("span"); d.className = "c4-dot"; c4g.appendChild(d); }
        tl.fromTo(c4g.querySelectorAll(".c4-dot"),
          { scale: 0.3, opacity: 0.3 },
          { scale: 1, opacity: 1, duration: 0.8, ease: "power2.out",
            stagger: { each: 0.015, from: "center" }, repeat: 2, yoyo: true }, 0);

        // C5 — logo shapes assemble
        var shapes = [root.querySelector(".c5-sq"), root.querySelector(".c5-tri"), root.querySelector(".c5-circ")];
        tl.fromTo(shapes[0], { x: -40, rotation: -12, opacity: 0 }, { x: 0, rotation: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 0.1);
        tl.fromTo(shapes[1], { y: 35, rotation: 15, opacity: 0 }, { y: 0, rotation: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 0.18);
        tl.fromTo(shapes[2], { x: 40, rotation: 18, opacity: 0 }, { x: 0, rotation: 0, opacity: 1, duration: 0.5, ease: "back.out(1.4)" }, 0.25);
        tl.to(shapes, { rotation: "+=5", duration: 0.8, ease: "sine.inOut", repeat: 1, yoyo: true, stagger: 0.06 }, 0.8);

        // C7 — shader rotation
        tl.to(root.querySelector(".c7-field"), { rotation: 5, duration: 2.71, ease: "sine.inOut", transformOrigin: "50% 50%" }, 0);

        // C8 — lower-third slides in
        tl.fromTo(root.querySelector(".c8-lt"), { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.35, ease: "power3.out" }, 0.3);

        // C9 — SVG path draws
        tl.fromTo(root.querySelector(".c9-path"), { strokeDashoffset: 260 }, { strokeDashoffset: 0, duration: 1.1, ease: "power2.inOut" }, 0);
        tl.fromTo(root.querySelector(".c9-path"), { strokeDashoffset: 0 }, { strokeDashoffset: -260, duration: 1.1, ease: "power2.inOut" }, 1.3);
        tl.to(root.querySelector(".c9-dot"), { x: 170, y: -50, duration: 1.1, ease: "power2.inOut", repeat: 1, yoyo: true }, 0);

        // C10 — cube rotates
        tl.to(root.querySelector(".c10-cube"), { rotationY: 360, rotationX: 25, duration: 2.71, ease: "none" }, 0);

        // C11 — waveform bars
        var c11c = root.querySelector("#c11-bars");
        var wH = [24, 52, 38, 64, 30, 48, 70, 42, 56, 28, 46, 62, 34, 50, 22];
        for (var w = 0; w < wH.length; w++) { var wb = document.createElement("span"); wb.className = "c11-bar"; wb.style.height = "0px"; c11c.appendChild(wb); }
        c11c.querySelectorAll(".c11-bar").forEach(function (el, idx) {
          tl.fromTo(el, { height: 4 }, { height: wH[idx], duration: 0.3, ease: "sine.inOut", repeat: 4, yoyo: true }, idx * 0.035);
        });

        // C12 — swatches scale in
        tl.fromTo(root.querySelectorAll(".c12-sw"),
          { scale: 0, borderRadius: "50%" },
          { scale: 1, borderRadius: "5px", duration: 0.35, ease: "back.out(1.7)", stagger: { each: 0.05, from: "random" } }, 0.15);

        // C14 — circular progress fills
        tl.fromTo(root.querySelector(".c14-fill"),
          { strokeDashoffset: 264 },
          { strokeDashoffset: 264 * 0.22, duration: 1.4, ease: "power2.out" }, 0.1);

        // C16 — blob rotates slowly
        tl.to(root.querySelector(".c16-blob"), { rotation: 12, duration: 2.71, ease: "sine.inOut", transformOrigin: "50% 50%" }, 0);

        window.__timelines["canvas-open"] = tl;
      })();
    </script>
  </div>
</template>
