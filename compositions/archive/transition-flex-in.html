<template id="transition-flex-in-template">
  <div
    data-composition-id="transition-flex-in"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="0.6"
  >
    <!-- Whip pan shader transition — horizontal motion blur from Beat 5's
         warm cream to Beat 6A's light white. WebGL canvas on top of everything. -->
    <canvas id="whip-canvas" width="1920" height="1080"></canvas>

    <style>
      [data-composition-id="transition-flex-in"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        pointer-events: none;
      }
      [data-composition-id="transition-flex-in"] #whip-canvas {
        position: absolute;
        top: 0; left: 0;
        width: 1920px; height: 1080px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var root = document.querySelector('[data-composition-id="transition-flex-in"]');
        var canvas = root.querySelector("#whip-canvas");
        var gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

        if (!gl) {
          // Fallback for headless: simple CSS opacity transition
          canvas.style.display = "none";
          var fallback = document.createElement("div");
          fallback.style.cssText = "position:absolute;inset:0;background:#fcf6e7;";
          root.appendChild(fallback);
          tl.to(fallback, { opacity: 0, duration: 0.6, ease: "power2.inOut" }, 0);
          window.__timelines["transition-flex-in"] = tl;
          return;
        }

        gl.viewport(0, 0, 1920, 1080);

        // Vertex shader
        var vertSrc =
          "attribute vec2 a_pos; varying vec2 v_uv; void main(){" +
          "v_uv=a_pos*0.5+0.5; v_uv.y=1.0-v_uv.y; gl_Position=vec4(a_pos,0,1);}";

        // Whip Pan fragment shader — 10-sample directional motion blur
        var H =
          "precision mediump float;" +
          "varying vec2 v_uv;" +
          "uniform sampler2D u_from, u_to;" +
          "uniform float u_progress;" +
          "uniform vec2 u_resolution;\n";

        var fragSrc = H +
          "void main() {" +
          "  float fromOff = u_progress * 1.5;" +
          "  vec3 fromC = vec3(0.);" +
          "  for (int i = 0; i < 10; i++) {" +
          "    float f = float(i) / 10.;" +
          "    vec2 fuv = vec2(v_uv.x + fromOff + u_progress * .08 * f, v_uv.y);" +
          "    fromC += texture2D(u_from, clamp(fuv, 0., 1.)).rgb;" +
          "  }" +
          "  fromC /= 10.;" +
          "  float toOff = (1. - u_progress) * 1.5;" +
          "  vec3 toC = vec3(0.);" +
          "  for (int i = 0; i < 10; i++) {" +
          "    float f = float(i) / 10.;" +
          "    vec2 tuv = vec2(v_uv.x - toOff - (1. - u_progress) * .08 * f, v_uv.y);" +
          "    toC += texture2D(u_to, clamp(tuv, 0., 1.)).rgb;" +
          "  }" +
          "  toC /= 10.;" +
          "  gl_FragColor = vec4(mix(fromC, toC, u_progress), 1.);" +
          "}";

        // Compile
        function mkShader(type, src) {
          var s = gl.createShader(type);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          return s;
        }
        var prog = gl.createProgram();
        gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, vertSrc));
        gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, fragSrc));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        // Fullscreen quad
        var buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        var aPos = gl.getAttribLocation(prog, "a_pos");
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

        // Create solid-color textures matching Beat 5 and 6A backgrounds
        function mkColorTex(r, g, b) {
          var tex = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
            new Uint8Array([r, g, b, 255]));
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
          return tex;
        }

        // Beat 5 warm cream: #fcf6e7 = rgb(252, 246, 231)
        var texFrom = mkColorTex(252, 246, 231);
        // Beat 6A white: #fafaf2 = rgb(250, 250, 242)
        var texTo = mkColorTex(250, 250, 242);

        // Uniform locations
        var uFrom = gl.getUniformLocation(prog, "u_from");
        var uTo = gl.getUniformLocation(prog, "u_to");
        var uProg = gl.getUniformLocation(prog, "u_progress");
        var uRes = gl.getUniformLocation(prog, "u_resolution");

        function renderFrame(progress) {
          gl.useProgram(prog);
          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, texFrom);
          gl.uniform1i(uFrom, 0);
          gl.activeTexture(gl.TEXTURE1);
          gl.bindTexture(gl.TEXTURE_2D, texTo);
          gl.uniform1i(uTo, 1);
          gl.uniform1f(uProg, progress);
          gl.uniform2f(uRes, 1920, 1080);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        // Initial render (progress 0 = fully "from" = warm cream)
        renderFrame(0);

        // GSAP drives progress 0→1
        var proxy = { progress: 0 };
        tl.to(proxy, {
          progress: 1,
          duration: 0.6,
          ease: "power2.inOut",
          onUpdate: function () { renderFrame(proxy.progress); }
        }, 0);

        window.__timelines["transition-flex-in"] = tl;
      })();
    </script>
  </div>
</template>
